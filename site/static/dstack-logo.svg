<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Stack layers (isometric-ish parallelograms) -->
  <!-- Bottom layer: Memory (green) -->
  <path d="M32 78 L64 92 L96 78 L64 64 Z" fill="url(#layer1)" opacity="0.9"/>
  <path d="M32 78 L32 72 L64 58 L64 64 Z" fill="#238636" opacity="0.5"/>
  <path d="M64 64 L64 58 L96 72 L96 78 Z" fill="#3fb950" opacity="0.3"/>

  <!-- Middle layer: CLI (blue) -->
  <path d="M32 64 L64 78 L96 64 L64 50 Z" fill="url(#layer2)" opacity="0.9"/>
  <path d="M32 64 L32 58 L64 44 L64 50 Z" fill="#1f6feb" opacity="0.5"/>
  <path d="M64 50 L64 44 L96 58 L96 64 Z" fill="#58a6ff" opacity="0.3"/>

  <!-- Top layer: Skills (orange) -->
  <path d="M32 50 L64 64 L96 50 L64 36 Z" fill="url(#layer3)" opacity="0.9"/>
  <path d="M32 50 L32 44 L64 30 L64 36 Z" fill="#ea580c" opacity="0.5"/>
  <path d="M64 36 L64 30 L96 44 L96 50 Z" fill="#f97316" opacity="0.3"/>

  <!-- Shield/checkmark glow (quality gate) -->
  <polyline points="57,46 62,52 73,40" stroke="#3fb950" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Subtle pulse rings around checkmark -->
  <circle cx="64" cy="46" r="12" stroke="#3fb950" stroke-width="1" opacity="0.2"/>
  <circle cx="64" cy="46" r="18" stroke="#3fb950" stroke-width="0.5" opacity="0.1"/>
</svg>
