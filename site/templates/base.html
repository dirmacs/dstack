<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{{ config.description }}">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="{{ config.base_url }}" class="logo">
        <span class="logo-d">d</span>stack
      </a>
      <div class="nav-links">
        <a href="{{ get_url(path='@/_index.md') }}">Home</a>
        <a href="{{ get_url(path='story/') }}">Story</a>
        <a href="https://github.com/dirmacs/dstack">GitHub</a>
        <a href="https://crates.io/crates/dstack-cli">crates.io</a>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="footer-inner">
      <span>Built by <a href="https://dirmacs.com">DIRMACS</a></span>
      <span class="sep">·</span>
      <span>Powered by <a href="https://www.getzola.org">Zola</a></span>
    </div>
  </footer>
</body>
</html>
